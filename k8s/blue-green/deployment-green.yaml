# DATA 789 · HW4 — blue-green rollout. GREEN = the new color you cut over to.
# Identical to blue except color: green and a new image tag (v2). Deploy green alongside
# blue, verify it's healthy, then flip the Service selector to green.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trustbank-fraud-green
  labels:
    app: trustbank-fraud-bg
    color: green
spec:
  replicas: 3
  selector:
    matchLabels:
      app: trustbank-fraud-bg
      color: green
  template:
    metadata:
      labels:
        app: trustbank-fraud-bg
        color: green
    spec:
      containers:
        - name: fraud
          image: ghcr.io/rfsalas/trustbank-fraud:v2   # the "new" version you're rolling out
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: REDIS_HOST
              value: "redis"
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
