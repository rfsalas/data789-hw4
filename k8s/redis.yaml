# DATA 789 · HW4 — Redis feature store for the fraud API.
# The API reads customer features from Redis when scoring /predict. Health, probes,
# the HPA, the LoadBalancer, and rolling/blue-green updates all work WITHOUT Redis;
# this is only needed so a /predict call returns a real score. No data seeding
# required — an unknown customer falls back to the API's built-in rule-based scorer.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels: { app: redis }
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - { name: redis, containerPort: 6379 }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "250m", memory: "128Mi" }
          readinessProbe:
            tcpSocket: { port: redis }
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis                 # the API finds Redis at this DNS name (REDIS_HOST=redis)
  labels: { app: redis }
spec:
  type: ClusterIP             # internal only — not exposed outside the cluster
  selector: { app: redis }
  ports:
    - { name: redis, port: 6379, targetPort: redis }
